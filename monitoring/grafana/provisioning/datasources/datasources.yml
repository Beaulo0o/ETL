# datasources.yml - Источники данных для Grafana
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: "30s"
      queryTimeout: "30s"
      httpMethod: "POST"

  - name: PostgreSQL
    type: postgres
    access: proxy
    url: postgres:5432
    database: retail_db
    user: etl_user
    secureJsonData:
      password: etl_password
    jsonData:
      sslmode: "disable"
      postgresVersion: 1500
      timescaledb: false

  - name: Loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: true