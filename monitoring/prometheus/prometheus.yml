# prometheus.yml - Конфигурация Prometheus для сбора метрик
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'retail-etl'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "airflow_rules.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'airflow'
    static_configs:
      - targets: ['airflow-webserver:8080']
        labels:
          service: 'airflow'
          env: 'development'
      - targets: ['airflow-scheduler:8974']
        labels:
          service: 'airflow-scheduler'
          env: 'development'
      - targets: ['airflow-worker:8793']
        labels:
          service: 'airflow-worker'
          env: 'development'
    metrics_path: '/admin/metrics'

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres:9187']
        labels:
          service: 'postgresql'
          env: 'development'

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:9121']
        labels:
          service: 'redis'
          env: 'development'

  - job_name: 'minio'
    metrics_path: '/minio/v2/metrics/cluster'
    static_configs:
      - targets: ['minio:9000']
        labels:
          service: 'minio'
          env: 'development'